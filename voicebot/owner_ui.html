<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>ZAIKA — Owner Intelligence</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:ital,wght@0,300;0,600;1,300;1,500&display=swap"
    rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0F1117;
      --surface: #161820;
      --card: #1C1F2E;
      --card2: #212435;
      --border: #2A2D3E;
      --border2: #333650;
      --amber: #E8A930;
      --amber-dim: rgba(232, 169, 48, 0.12);
      --amber-mid: rgba(232, 169, 48, 0.25);
      --emerald: #2DD4A0;
      --emerald-dim: rgba(45, 212, 160, 0.1);
      --rose: #F4637A;
      --rose-dim: rgba(244, 99, 122, 0.1);
      --sky: #5BA4F5;
      --sky-dim: rgba(91, 164, 245, 0.1);
      --violet: #9B8CF8;
      --text: #E8E6F0;
      --text2: #B0AEBF;
      --text3: #6E6C80;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      font-size: 13px
    }

    ::-webkit-scrollbar {
      width: 3px;
      height: 3px
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 4px
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--amber), #C47A15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px
    }

    .logo-text {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px
    }

    .logo-text span {
      color: var(--amber)
    }

    .logo-badge {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
      font-weight: 500;
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 2px 6px
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--emerald-dim);
      border: 1px solid rgba(45, 212, 160, 0.2);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--emerald);
      font-weight: 500
    }

    .pulse {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--emerald);
      animation: pulse 2.5s infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .app {
      display: grid;
      grid-template-columns: 1fr 420px;
      height: calc(100vh - 56px)
    }

    .dash {
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px
    }

    .kpi {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      position: relative;
      overflow: hidden;
      transition: border-color .2s
    }

    .kpi:hover {
      border-color: var(--border2)
    }

    .kpi-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 10px
    }

    .kpi-value {
      font-family: 'Fraunces', serif;
      font-size: 30px;
      font-weight: 600;
      letter-spacing: -1px;
      line-height: 1
    }

    .kpi-value.amber {
      color: var(--amber)
    }

    .kpi-value.emerald {
      color: var(--emerald)
    }

    .kpi-value.sky {
      color: var(--sky)
    }

    .kpi-footer {
      margin-top: 8px;
      font-size: 11px;
      color: var(--text3)
    }

    .kpi-accent {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      opacity: .6
    }

    .kpi-accent.amber {
      background: linear-gradient(90deg, var(--amber), transparent)
    }

    .kpi-accent.emerald {
      background: linear-gradient(90deg, var(--emerald), transparent)
    }

    .kpi-accent.sky {
      background: linear-gradient(90deg, var(--sky), transparent)
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden
    }

    .panel-hdr {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px
    }

    .panel-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: var(--text)
    }

    .panel-tag {
      margin-left: auto;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 4px
    }

    .tag-amber {
      background: var(--amber-dim);
      color: var(--amber);
      border: 1px solid rgba(232, 169, 48, 0.2)
    }

    .tag-emerald {
      background: var(--emerald-dim);
      color: var(--emerald);
      border: 1px solid rgba(45, 212, 160, 0.2)
    }

    .tag-rose {
      background: var(--rose-dim);
      color: var(--rose);
      border: 1px solid rgba(244, 99, 122, 0.2)
    }

    .tag-sky {
      background: var(--sky-dim);
      color: var(--sky);
      border: 1px solid rgba(91, 164, 245, 0.2)
    }

    .item-list {
      padding: 6px
    }

    .item-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      transition: background .15s
    }

    .item-row:hover {
      background: rgba(255, 255, 255, 0.025)
    }

    .item-num {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      background: var(--card2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: var(--text3);
      flex-shrink: 0
    }

    .item-name {
      flex: 1;
      font-size: 12px;
      font-weight: 500;
      color: var(--text)
    }

    .item-right {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .item-orders {
      font-size: 11px;
      color: var(--text3)
    }

    .pill {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: .3px
    }

    .pill-amber {
      background: var(--amber-dim);
      color: var(--amber)
    }

    .pill-emerald {
      background: var(--emerald-dim);
      color: var(--emerald)
    }

    .pill-rose {
      background: var(--rose-dim);
      color: var(--rose)
    }

    .pill-sky {
      background: var(--sky-dim);
      color: var(--sky)
    }

    .cat-list {
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px
    }

    .cat-row {
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .cat-row-top {
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .cat-name-txt {
      font-size: 11px;
      font-weight: 600;
      color: var(--text2)
    }

    .cat-rev-txt {
      font-size: 11px;
      font-weight: 600;
      color: var(--amber)
    }

    .cat-bar-bg {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden
    }

    .cat-bar-fg {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--amber), rgba(232, 169, 48, 0.4));
      transition: width .6s ease
    }

    .combo-list {
      padding: 6px
    }

    .combo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--radius-sm);
      transition: background .15s
    }

    .combo-row:hover {
      background: rgba(255, 255, 255, 0.025)
    }

    .combo-pair {
      flex: 1;
      font-size: 12px
    }

    .combo-a {
      color: var(--text);
      font-weight: 500
    }

    .combo-sep {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: var(--sky-dim);
      color: var(--sky);
      font-size: 10px;
      font-weight: 700;
      margin: 0 5px
    }

    .combo-b {
      color: var(--sky);
      font-weight: 500
    }

    .combo-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0
    }

    .conf-track {
      width: 64px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden
    }

    .conf-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--sky), var(--violet))
    }

    .conf-num {
      font-size: 10px;
      font-weight: 700;
      color: var(--sky);
      width: 28px;
      text-align: right
    }

    .hours-wrap {
      padding: 12px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .hours-chart {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 72px
    }

    .h-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      height: 100%
    }

    .h-bar {
      width: 100%;
      border-radius: 3px 3px 0 0;
      min-height: 3px;
      transition: height .4s ease
    }

    .h-bar.peak {
      background: linear-gradient(180deg, var(--amber), rgba(232, 169, 48, 0.4))
    }

    .h-bar.normal {
      background: var(--border2)
    }

    .h-lbl {
      font-size: 8px;
      color: var(--text3);
      font-weight: 500
    }

    .hours-legend {
      display: flex;
      gap: 14px
    }

    .leg-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--text3)
    }

    .leg-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px
    }

    .chat-col {
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--surface)
    }

    .chat-hdr {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px
    }

    .chat-hdr-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(232, 169, 48, 0.2), rgba(155, 140, 248, 0.2));
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px
    }

    .chat-hdr-text {
      flex: 1
    }

    .chat-hdr-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text)
    }

    .chat-hdr-sub {
      font-size: 10px;
      color: var(--text3);
      margin-top: 1px
    }

    .chat-reset {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      color: var(--text3)
    }

    .chat-reset:hover {
      border-color: var(--rose);
      color: var(--rose)
    }

    .chat-reset svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    .prompts-wrap {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 5px
    }

    .qp {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 500;
      color: var(--text3);
      cursor: pointer;
      transition: all .18s;
      font-family: 'Plus Jakarta Sans', sans-serif;
      white-space: nowrap
    }

    .qp:hover {
      border-color: var(--amber);
      color: var(--amber);
      background: var(--amber-dim)
    }

    .chat-msgs {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px
    }

    .msg {
      max-width: 92%;
      animation: fadeUp .2s ease
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .msg.user {
      align-self: flex-end
    }

    .msg.bot {
      align-self: flex-start
    }

    .bubble {
      padding: 9px 13px;
      font-size: 12px;
      line-height: 1.7;
      border-radius: 10px
    }

    .msg.user .bubble {
      background: var(--amber-dim);
      border: 1px solid var(--amber-mid);
      color: var(--amber);
      border-radius: 10px 10px 2px 10px;
      font-weight: 500
    }

    .msg.bot .bubble {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 2px 10px 10px 10px
    }

    .msg.bot .bubble strong {
      color: var(--amber);
      font-weight: 600
    }

    .msg.bot .bubble ul {
      margin: 6px 0 4px 16px
    }

    .msg.bot .bubble li {
      margin: 3px 0;
      color: var(--text2)
    }

    .msg-meta {
      font-size: 9px;
      color: var(--text3);
      margin-top: 3px;
      padding: 0 3px
    }

    .msg.user .msg-meta {
      text-align: right
    }

    .typing-wrap {
      align-self: flex-start
    }

    .typing-wrap .bubble {
      display: flex;
      gap: 5px;
      align-items: center
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text3);
      animation: dotpulse 1.2s infinite
    }

    .dot:nth-child(2) {
      animation-delay: .2s
    }

    .dot:nth-child(3) {
      animation-delay: .4s
    }

    @keyframes dotpulse {

      0%,
      100% {
        opacity: .2;
        transform: scale(.7)
      }

      50% {
        opacity: 1;
        transform: scale(1)
      }
    }

    .chat-input-row {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end
    }

    .chat-input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 13px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      color: var(--text);
      resize: none;
      outline: none;
      line-height: 1.5;
      min-height: 38px;
      max-height: 110px;
      transition: border-color .2s
    }

    .chat-input:focus {
      border-color: rgba(232, 169, 48, 0.35)
    }

    .chat-input::placeholder {
      color: var(--text3)
    }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--amber);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      flex-shrink: 0
    }

    .send-btn:hover {
      background: #D4911A;
      transform: scale(1.04)
    }

    .send-btn:disabled {
      opacity: .35;
      cursor: not-allowed;
      transform: none
    }

    .send-btn svg {
      width: 15px;
      height: 15px;
      stroke: #000;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    .welcome {
      text-align: center;
      padding: 32px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center
    }

    .welcome-glyph {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--amber-dim), rgba(155, 140, 248, 0.1));
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin: 0 auto 14px
    }

    .welcome-title {
      font-family: 'Fraunces', serif;
      font-size: 17px;
      font-style: italic;
      color: var(--text);
      margin-bottom: 6px
    }

    .welcome-desc {
      font-size: 11px;
      color: var(--text3);
      line-height: 1.7;
      max-width: 240px;
      margin: 0 auto
    }

    .loading {
      text-align: center;
      padding: 48px;
      color: var(--text3);
      font-size: 12px
    }

    @media(max-width:960px) {
      .app {
        grid-template-columns: 1fr
      }

      .chat-col {
        height: 560px
      }

      .kpi-grid {
        grid-template-columns: 1fr 1fr
      }

      .two-col {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="logo-wrap">
      <div class="logo-icon">🍽</div>
      <div class="logo-text">ZAIKA <span>Intelligence</span></div>
      <div class="logo-badge">Owner Console</div>
    </div>
    <div class="status-pill">
      <div class="pulse"></div><span id="statusText">Connecting...</span>
    </div>
  </header>

  <div class="app">
    <div class="dash" id="dashPanel">
      <div class="loading">Loading analytics...</div>
    </div>

    <div class="chat-col">
      <div class="chat-hdr">
        <div class="chat-hdr-icon">🤖</div>
        <div class="chat-hdr-text">
          <div class="chat-hdr-title">AI Business Advisor</div>
          <div class="chat-hdr-sub">Powered by real transaction data</div>
        </div>
        <button class="chat-reset" onclick="resetChat()">
          <svg viewBox="0 0 24 24">
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
            <path d="M21 3v5h-5" />
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
            <path d="M8 16H3v5" />
          </svg>
        </button>
      </div>
      <div class="prompts-wrap">
        <button class="qp" onclick="sendPrompt(this)">💰 Increase revenue</button>
        <button class="qp" onclick="sendPrompt(this)">🗑 Items to remove</button>
        <button class="qp" onclick="sendPrompt(this)">💎 Hidden gems</button>
        <button class="qp" onclick="sendPrompt(this)">🔗 Best combos</button>
        <button class="qp" onclick="sendPrompt(this)">⚠️ Risk items</button>
        <button class="qp" onclick="sendPrompt(this)">⏰ Peak hours</button>
        <button class="qp" onclick="sendPrompt(this)">🏷 Pricing strategy</button>
        <button class="qp" onclick="sendPrompt(this)">📊 Category analysis</button>
      </div>
      <div class="chat-msgs" id="chatMsgs">
        <div class="welcome">
          <div class="welcome-glyph">📊</div>
          <div class="welcome-title">Your data, fully analyzed.</div>
          <div class="welcome-desc">Ask anything about revenue, menu optimization, combo deals, or pricing strategy.
          </div>
        </div>
      </div>
      <div class="chat-input-row">
        <textarea class="chat-input" id="chatInput" placeholder="Ask about your restaurant..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const API = 'http://127.0.0.1:8001';
    const SESSION = 'owner_' + Math.random().toString(36).slice(2, 9);
    let stats = null;

    async function loadStats() {
      try {
        const r = await fetch(`${API}/api/owner/stats`);
        stats = await r.json();
        document.getElementById('statusText').textContent = `${stats.overview.total_orders.toLocaleString()} orders loaded`;
        renderDashboard();
      } catch (e) {
        document.getElementById('dashPanel').innerHTML = '<div class="loading" style="color:#F4637A">Server not running.<br>Start: python owner_analytics.py</div>';
        document.getElementById('statusText').textContent = 'Disconnected';
      }
    }

    function renderDashboard() {
      const s = stats, o = s.overview;
      const maxRev = Math.max(...s.categories.map(c => c.total_revenue));
      const maxH = Math.max(...s.hourly.map(h => h.orders));
      const avgH = s.hourly.reduce((a, h) => a + h.orders, 0) / s.hourly.length;
      document.getElementById('dashPanel').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Total Orders</div><div class="kpi-value amber">${o.total_orders.toLocaleString()}</div><div class="kpi-footer">All time transactions</div><div class="kpi-accent amber"></div></div>
      <div class="kpi"><div class="kpi-label">Total Profit</div><div class="kpi-value emerald">&#8377;${(o.total_revenue / 100000).toFixed(1)}L</div><div class="kpi-footer">Cumulative margin</div><div class="kpi-accent emerald"></div></div>
      <div class="kpi"><div class="kpi-label">Avg Order Value</div><div class="kpi-value sky">&#8377;${o.avg_order_value.toLocaleString()}</div><div class="kpi-footer">Per transaction</div><div class="kpi-accent sky"></div></div>
    </div>
    <div class="panel">
      <div class="panel-hdr"><span style="font-size:14px">📂</span><span class="panel-title">Category Revenue</span><span class="panel-tag tag-amber">PERFORMANCE</span></div>
      <div class="cat-list">${s.categories.map(c => `<div class="cat-row"><div class="cat-row-top"><span class="cat-name-txt">${c.menu_category || c.category || '—'}</span><span class="cat-rev-txt">&#8377;${(c.total_revenue / 1000).toFixed(0)}K</span></div><div class="cat-bar-bg"><div class="cat-bar-fg" style="width:${Math.round((c.total_revenue / maxRev) * 100)}%"></div></div></div>`).join('')}</div>
    </div>
    <div class="two-col">
      <div class="panel">
        <div class="panel-hdr"><span style="font-size:14px">⭐</span><span class="panel-title">Star Items</span><span class="panel-tag tag-amber">TOP</span></div>
        <div class="item-list">${s.stars.map((item, i) => `<div class="item-row"><div class="item-num">${i + 1}</div><div class="item-name">${item.food_name}</div><div class="item-right"><span class="item-orders">${item.orders}</span><span class="pill pill-amber">${item.avg_margin.toFixed(0)}%</span></div></div>`).join('')}</div>
      </div>
      <div class="panel">
        <div class="panel-hdr"><span style="font-size:14px">💎</span><span class="panel-title">Hidden Stars</span><span class="panel-tag tag-emerald">PROMOTE</span></div>
        <div class="item-list">${s.hidden_gems.map((item, i) => `<div class="item-row"><div class="item-num">${i + 1}</div><div class="item-name">${item.food_name}</div><div class="item-right"><span class="item-orders">${item.orders}</span><span class="pill pill-emerald">${item.avg_margin.toFixed(0)}%</span></div></div>`).join('')}</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-hdr"><span style="font-size:14px">🔗</span><span class="panel-title">Top Combo Opportunities</span><span class="panel-tag tag-sky">BUILD BUNDLES</span></div>
      <div class="combo-list">${s.combos.map(c => `<div class="combo-row"><div class="combo-pair"><span class="combo-a">${c.item_a}</span><span class="combo-sep">+</span><span class="combo-b">${c.item_b}</span></div><div class="combo-right"><div class="conf-track"><div class="conf-fill" style="width:${Math.round(c.max_conf * 100)}%"></div></div><div class="conf-num">${Math.round(c.max_conf * 100)}%</div></div></div>`).join('')}</div>
    </div>
    <div class="two-col">
      <div class="panel">
        <div class="panel-hdr"><span style="font-size:14px">📉</span><span class="panel-title">Underperformers</span><span class="panel-tag tag-rose">REVIEW</span></div>
        <div class="item-list">${s.dogs.map((item, i) => `<div class="item-row"><div class="item-num">${i + 1}</div><div class="item-name">${item.food_name}</div><div class="item-right"><span class="item-orders">${item.orders}</span><span class="pill pill-rose">${item.avg_margin.toFixed(0)}%</span></div></div>`).join('')}</div>
      </div>
      <div class="panel">
        <div class="panel-hdr"><span style="font-size:14px">⏰</span><span class="panel-title">Peak Hours</span><span class="panel-tag tag-sky">TRAFFIC</span></div>
        <div class="hours-wrap">
          <div class="hours-chart">${s.hourly.map(h => `<div class="h-col"><div class="h-bar ${h.orders >= avgH * 1.2 ? 'peak' : 'normal'}" style="height:${Math.max(4, Math.round((h.orders / maxH) * 64))}px"></div><div class="h-lbl">${h.hour}</div></div>`).join('')}</div>
          <div class="hours-legend"><div class="leg-item"><div class="leg-dot" style="background:var(--amber)"></div>Peak</div><div class="leg-item"><div class="leg-dot" style="background:var(--border2)"></div>Regular</div></div>
        </div>
      </div>
    </div>`;
    }

    function ftime() { return new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }) }

    function appendMsg(role, text) {
      const msgs = document.getElementById('chatMsgs');
      msgs.querySelector('.welcome')?.remove();
      const d = document.createElement('div');
      d.className = `msg ${role}`;
      const html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
      d.innerHTML = `<div class="bubble">${html}</div><div class="msg-meta">${ftime()}</div>`;
      msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
    }

    function showTyping() {
      const msgs = document.getElementById('chatMsgs');
      const d = document.createElement('div');
      d.className = 'msg bot typing-wrap'; d.id = 'typing';
      d.innerHTML = `<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
      msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
    }
    function hideTyping() { document.getElementById('typing')?.remove() }

    async function sendMessage() {
      const inp = document.getElementById('chatInput');
      const text = inp.value.trim();
      if (!text) return;
      inp.value = ''; inp.style.height = 'auto';
      document.getElementById('sendBtn').disabled = true;
      appendMsg('user', text); showTyping();
      try {
        const r = await fetch(`${API}/api/owner/chat`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_id: SESSION, message: text }) });
        const data = await r.json();
        hideTyping(); appendMsg('bot', data.reply);
      } catch (e) { hideTyping(); appendMsg('bot', 'Connection error. Is the server running?') }
      document.getElementById('sendBtn').disabled = false; inp.focus();
    }

    function sendPrompt(btn) { document.getElementById('chatInput').value = btn.textContent.slice(2).trim(); sendMessage() }
    function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() } }
    function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 110) + 'px' }

    async function resetChat() {
      await fetch(`${API}/api/owner/reset`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ session_id: SESSION }) });
      document.getElementById('chatMsgs').innerHTML = `<div class="welcome"><div class="welcome-glyph">📊</div><div class="welcome-title">Your data, fully analyzed.</div><div class="welcome-desc">Ask anything about revenue, menu optimization, combo deals, or pricing strategy.</div></div>`;
    }

    loadStats();
  </script>
</body>

</html>
